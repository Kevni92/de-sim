name: Bürgergeld-Standardmodus integrieren

on:
  push:
    branches: [feat/38-buergergeld-alltagssprache-clean]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/38-buergergeld-alltagssprache-clean
      - name: Geprüfte Issue-38-Dateien übernehmen
        run: |
          set -euo pipefail
          git fetch origin feat/38-buergergeld-alltagssprache
          git checkout origin/feat/38-buergergeld-alltagssprache -- \
            e2e/expense-modules.spec.ts \
            package.json \
            src/components/Sgb2EverydayExpenseEditor.tsx \
            src/lib/sgb2-simple-controls.ts \
            src/pages/ExpenseModulesPage.tsx \
            src/sgb2-everyday.css \
            technical-docs/BUERGERGELD-STANDARDMODUS.md \
            technical-docs/README.md \
            tests/sgb2-simple-controls.test.ts \
            tests/tsconfig.json
          rm .github/workflows/integrate-buergergeld-standard.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: Bürgergeld-Standardmodus sauber integrieren (#38)"
          git push origin HEAD:feat/38-buergergeld-alltagssprache-clean
