name: Prüfung

on:
  pull_request:
  push:
    branches: [main, feat/sgb2-e2e-release]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  source-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/sgb2-e2e-release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Quellcode für lokale Prüfung archivieren
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=dist --exclude=test-results --exclude=playwright-report --exclude=de-sim-source.tgz -czf de-sim-source.tgz .
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f de-sim-source.tgz
          git commit -m "chore: lokaler Quellcode-Snapshot [skip ci]"
          git push

  quality:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        shell: bash
        run: set -o pipefail; npm run typecheck 2>&1 | tee typecheck.log
      - name: Produktions-Build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee build.log
      - name: Unit-Tests
        shell: bash
        run: set -o pipefail; npm run test:unit 2>&1 | tee unit-tests.log
      - name: Qualitätsdiagnose hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            typecheck.log
            build.log
            unit-tests.log
          if-no-files-found: warn
          retention-days: 7

  e2e:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Playwright Desktop und Mobil
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee playwright.log
      - name: Playwright-Diagnose und Bericht hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright.log
            playwright-report/
            test-results/**/*.png
          if-no-files-found: warn
          retention-days: 14
