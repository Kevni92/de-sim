name: Prüfung

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck, Build und Unit-Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm-Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm install --no-audit --no-fund --prefer-offline
      - name: Typecheck
        shell: bash
        run: set -o pipefail; npm run typecheck 2>&1 | tee typecheck.log
      - name: Produktions-Build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee build.log
      - name: Unit-Tests
        shell: bash
        run: set -o pipefail; npm run test:unit 2>&1 | tee unit-tests.log
      - name: Qualitätsdiagnose bei Fehler hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            typecheck.log
            build.log
            unit-tests.log
          if-no-files-found: warn
          retention-days: 7

  e2e:
    name: Playwright Desktop und Mobil
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm-Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm install --no-audit --no-fund --prefer-offline
      - name: Playwright-Browser cachen
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
      - name: Chromium und Systemabhängigkeiten bereitstellen
        run: npx playwright install --with-deps chromium
      - name: Playwright Desktop und Mobil
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee playwright.log
      - name: Browser-Screenshots hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-screenshots
          path: test-results/**/*.png
          if-no-files-found: warn
          retention-days: 14
      - name: Playwright-Diagnose bei Fehler hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright.log
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
