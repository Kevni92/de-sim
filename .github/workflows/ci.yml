name: Prüfung

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Typecheck
        shell: bash
        run: set -o pipefail; npm run typecheck 2>&1 | tee typecheck.log
      - run: npm run build
      - name: Unit-Tests
        shell: bash
        run: set -o pipefail; npm run test:unit 2>&1 | tee unit-tests.log
      - name: Playwright Desktop und Mobil
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee playwright.log
      - name: Typecheck-Diagnose hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: warn
          retention-days: 7
      - name: Unit-Test-Diagnose hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          if-no-files-found: warn
          retention-days: 7
      - name: Playwright-Diagnose hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: playwright.log
          if-no-files-found: warn
          retention-days: 7
      - name: Playwright-Bericht hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: SGB-II-Populationsscreenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sgb2-population-calibration
          path: test-results/sgb2-population-calibration.png
          if-no-files-found: warn
          retention-days: 14
      - name: Milestone-8-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-8-long-term-effects
          path: test-results/milestone-8-long-term-effects.png
          if-no-files-found: warn
          retention-days: 14
      - name: Milestone-7-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-7-synthetic-population
          path: test-results/milestone-7-synthetic-population.png
          if-no-files-found: warn
          retention-days: 14
      - name: UI-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detail-mask-alignment
          path: test-results/detail-mask-alignment.png
          if-no-files-found: warn
          retention-days: 14
      - name: Dashboard-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-disabled-items
          path: test-results/dashboard-disabled-items.png
          if-no-files-found: warn
          retention-days: 14
      - name: Evidenztooltip-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-tooltips
          path: test-results/evidence-tooltips.png
          if-no-files-found: warn
          retention-days: 14
