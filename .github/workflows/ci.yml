name: Prüfung

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Typecheck
        shell: bash
        run: set -o pipefail; npm run typecheck 2>&1 | tee typecheck.log
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:e2e
      - name: Typecheck-Diagnose hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: warn
          retention-days: 7
      - name: Playwright-Bericht hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Milestone-7-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-7-synthetic-population
          path: test-results/milestone-7-synthetic-population.png
          if-no-files-found: warn
          retention-days: 14
      - name: UI-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detail-mask-alignment
          path: test-results/detail-mask-alignment.png
          if-no-files-found: warn
          retention-days: 14
      - name: Dashboard-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-disabled-items
          path: test-results/dashboard-disabled-items.png
          if-no-files-found: warn
          retention-days: 14
      - name: Evidenztooltip-Screenshot hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-tooltips
          path: test-results/evidence-tooltips.png
          if-no-files-found: warn
          retention-days: 14
